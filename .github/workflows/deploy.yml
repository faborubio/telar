name: Deploy (Firebase Hosting + Functions)

# Despliega la app (Hosting) y el backend (Functions) a Firebase. GATEADO: el job solo corre
# si está configurada la variable de repo FIREBASE_PROJECT_ID (y el secret de service account).
# Hasta entonces es un no-op, así el push a main no falla. Ver runbook en DEPLOY.md §5.
#
# Config necesaria (una vez, en GitHub → Settings):
#   Variables: FIREBASE_PROJECT_ID, FIREBASE_API_KEY, FIREBASE_AUTH_DOMAIN, FIREBASE_APP_ID
#   Secret:    FIREBASE_SERVICE_ACCOUNT  (JSON de una service account con permisos de deploy)
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: deploy-${{ github.ref }}

jobs:
  deploy:
    name: Build + deploy (gateado)
    runs-on: ubuntu-latest
    if: ${{ vars.FIREBASE_PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate tokens
        run: pnpm tokens

      # La config web de Firebase NO es secreta (viaja al cliente): se inyecta desde variables
      # de repo. El modo `firebase` activa el backend real (ADR-017).
      - name: Write prod env (firebase backend + config)
        run: |
          cat > packages/app/.env.production <<EOF
          VITE_BACKEND=firebase
          VITE_FIREBASE_API_KEY=${{ vars.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ vars.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ vars.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID=${{ vars.FIREBASE_APP_ID }}
          EOF

      - name: Build (DS + app firebase-mode + functions)
        run: pnpm build

      - name: Auth a Firebase (service account)
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy Hosting + Functions
        run: >
          pnpm dlx firebase-tools@13 deploy
          --only hosting,functions
          --project ${{ vars.FIREBASE_PROJECT_ID }}
          --non-interactive
