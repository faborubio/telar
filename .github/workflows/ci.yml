name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela runs viejos del mismo ref para no malgastar minutos.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Orden barato-primero (SAD §10.1): tokens -> typecheck -> lint -> test -> build.
      # Turborepo cachea y solo re-ejecuta lo afectado.
      - name: Generate tokens
        run: pnpm tokens

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (incl. regla de dependencia ds ✗→ app)
        run: pnpm lint

      - name: Unit + component tests
        run: pnpm test

      - name: Build (ds library + app SPA)
        run: pnpm build
