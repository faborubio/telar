name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancela runs viejos del mismo ref para no malgastar minutos.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Orden barato-primero (SAD §10.1): tokens -> typecheck -> lint -> test -> build.
      # Turborepo cachea y solo re-ejecuta lo afectado.
      - name: Generate tokens
        run: pnpm tokens

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (incl. regla de dependencia ds ✗→ app)
        run: pnpm lint

      - name: Unit + component tests
        run: pnpm test

      - name: Build (ds library + app SPA)
        run: pnpm build

      - name: Size budgets (size-limit)
        run: pnpm size

  lighthouse:
    name: Lighthouse CI (performance + a11y budgets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Run Lighthouse CI
        run: pnpm lighthouse

  e2e:
    name: E2E (Cypress · flujos críticos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # La app en dev importa @telar/ds desde dist; tokens + build del DS son requisito.
      - name: Generate tokens
        run: pnpm tokens

      - name: Build (DS library para que la app dev lo resuelva)
        run: pnpm build

      # La action oficial gestiona Xvfb y la caché del binario de Cypress.
      # install:false → las deps ya se instalaron con pnpm (frozen-lockfile).
      - name: Cypress run (sobre el server de dev con MSW)
        uses: cypress-io/github-action@v6
        with:
          install: false
          working-directory: packages/app
          start: pnpm dev
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 120

  visual:
    name: Visual regression (Storybook test-runner · smoke + axe + pixel-diff)
    # Runner FIJO (no -latest): baselines y verificación deben renderizar en el mismo
    # entorno para que el diff de pixel sea determinista (ADR-016). Los baselines se
    # generan en este mismo SO vía el workflow visual-snapshots.yml.
    runs-on: ubuntu-24.04
    env:
      VISUAL_SNAPSHOTS: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate tokens
        run: pnpm tokens

      # El test-runner monta cada story en Chromium (Playwright): smoke + axe + pixel-diff.
      # Versión pinada a la del test-runner (lockfile) para que el binario de Chromium coincida.
      - name: Install Playwright (chromium + deps de sistema)
        run: pnpm dlx playwright@1.61.0 install chromium --with-deps

      - name: Build Storybook
        run: pnpm -C packages/ds build-storybook

      - name: Run Storybook test-runner
        run: pnpm -C packages/ds test-storybook:ci

      # Si el diff de pixel falla, subir las imágenes de diferencia para inspección.
      - name: Upload visual diffs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: packages/ds/__image_snapshots__/__diff_output__/
          if-no-files-found: ignore
